# TEMPLATE WORKFLOW
name: CI                     # Workflow name

on:                          # Trigger events
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:                     # Job ID
    runs-on: ubuntu-latest   # Runner environment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # Pulls your code into the runner

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'        # Specify Node version

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test